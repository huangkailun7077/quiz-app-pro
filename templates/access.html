<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧家庭题库 - 访问指南</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #0085D0 0%, #00A8E6 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo-bar {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 12px;
        }
        .logo-bar img {
            max-height: 60px;
            max-width: 200px;
            object-fit: contain;
        }
        h1 {
            color: #333;
            font-size: 1.6em;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 25px;
        }
        .qr-section {
            text-align: center;
            padding: 20px;
            background: #f5f7ff;
            border-radius: 15px;
            margin-bottom: 25px;
        }
        .qr-code {
            width: 200px;
            height: 200px;
            margin: 0 auto 15px;
            border: 4px solid #0085D0;
            border-radius: 10px;
        }
        .access-url {
            background: #0085D0;
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
        .info-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .info-card h3 {
            color: #0085D0;
            font-size: 1.1em;
            margin-bottom: 10px;
        }
        .info-card ul {
            list-style: none;
            color: #666;
            font-size: 0.9em;
        }
        .info-card li {
            padding: 5px 0;
            padding-left: 20px;
            position: relative;
        }
        .info-card li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #4CAF50;
            font-weight: bold;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #0085D0, #00A8E6);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1em;
            margin-top: 20px;
        }
        .note {
            background: #fff3cd;
            color: #856404;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85em;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-bar">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/China_Mobile_logo.svg/1200px-China_Mobile_logo.svg.png" alt="中移铁通" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 60%22><text x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 font-size=%2220%22 fill=%22%230085D0%22>中移铁通</text></svg>'">
        </div>
        
        <h1>📚 智慧家庭题库</h1>
        <p class="subtitle">中移铁通 ✨ 陪你一起刷题</p>
        
        <div class="qr-section">
            <h3 style="color:#0085D0;margin-bottom:15px;">📱 手机扫码访问</h3>
            <img class="qr-code" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=http://192.168.1.13:5002" alt="访问二维码">
            <p style="color:#666;font-size:0.9em;">请确保手机和电脑在同一 WiFi 网络</p>
        </div>
        
        <div class="access-url">
            http://192.168.1.13:5002
        </div>
        
        <div class="info-card">
            <h3>👥 学员登录</h3>
            <ul>
                <li>角色选择"学员"</li>
                <li>输入你的姓名（如：张三）</li>
                <li>选择所属网格（9 个选项）</li>
                <li>首次使用自动创建账号</li>
            </ul>
        </div>
        
        <div class="info-card">
            <h3>📖 功能说明</h3>
            <ul>
                <li>顺序刷题 / 随机刷题</li>
                <li>模拟考试（60 分钟，100 题）</li>
                <li>题库浏览（搜索、筛选）</li>
                <li>答题记录自动保存</li>
            </ul>
        </div>
        
        <a href="http://192.168.1.13:5002" class="btn">🚀 立即开始刷题</a>
        
        <div class="note">
            ⚠️ <strong>注意：</strong> 手机和电脑必须在同一 WiFi 网络下才能访问。如无法访问，请检查网络连接或联系管理员。
        </div>
    </div>
</body>
</html>
