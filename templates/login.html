<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧家庭题库 - 登录 ✨</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #0085D0 0%, #00A8E6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border-top: 6px solid #0085D0;
        }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header h1 { font-size: 1.8em; color: #333; margin-bottom: 10px; }
        .login-header p { color: #666; font-size: 0.9em; }
        .logo-bar {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 12px;
        }
        .logo-bar img {
            max-height: 60px;
            max-width: 200px;
            object-fit: contain;
        }
        .role-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .role-btn {
            padding: 15px; border: 2px solid #e0e0e0; border-radius: 12px;
            background: white; cursor: pointer; transition: all 0.3s; text-align: center;
        }
        .role-btn:hover { border-color: #0085D0; }
        .role-btn.selected { border-color: #0085D0; background: #0085D0; color: white; }
        .role-icon { font-size: 2em; margin-bottom: 8px; }
        .role-title { font-weight: bold; font-size: 0.95em; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #333; font-weight: bold; }
        .input-group input, .input-group select {
            width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0;
            border-radius: 10px; font-size: 1em; transition: border-color 0.3s;
        }
        .input-group input:focus, .input-group select:focus { outline: none; border-color: #0085D0; }
        .login-btn {
            width: 100%; padding: 15px; background: linear-gradient(135deg, #0085D0 0%, #00A8E6 100%);
            color: white; border: none; border-radius: 12px; font-size: 1.1em;
            font-weight: bold; cursor: pointer; transition: transform 0.2s;
        }
        .login-btn:hover { transform: translateY(-2px); }
        .login-btn:active { transform: translateY(0); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-message {
            background: #f44336; color: white; padding: 12px;
            border-radius: 8px; margin-bottom: 20px; display: none; text-align: center;
        }
        .footer { text-align: center; margin-top: 20px; color: #666; font-size: 0.85em; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-bar">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/China_Mobile_logo.svg/1200px-China_Mobile_logo.svg.png" alt="中移铁通" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 60%22><text x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 font-size=%2220%22 fill=%22%230085D0%22>中移铁通</text></svg>'">
        </div>
        
        <div class="login-header">
            <h1>📚 智慧家庭题库</h1>
            <p>中移铁通 ✨ 陪你一起刷题</p>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        
        <div class="role-selector">
            <div class="role-btn selected" onclick="selectRole('student')" id="role-student">
                <div class="role-icon">👨‍🎓</div>
                <div class="role-title">学员</div>
            </div>
            <div class="role-btn" onclick="selectRole('teacher')" id="role-teacher">
                <div class="role-icon">👩‍🏫</div>
                <div class="role-title">老师</div>
            </div>
        </div>
        
        <div class="input-group">
            <label for="username">用户名</label>
            <input type="text" id="username" placeholder="请输入用户名" maxlength="20">
        </div>
        
        <div class="input-group" id="gridGroup">
            <label for="grid">所属网格</label>
            <select id="grid">
                <option value="">请选择网格</option>
                <option value="白洋湾">白洋湾</option>
                <option value="金阊">金阊</option>
                <option value="虎丘">虎丘</option>
                <option value="平江">平江</option>
                <option value="苏锦">苏锦</option>
                <option value="沧浪">沧浪</option>
                <option value="双塔">双塔</option>
                <option value="吴门桥">吴门桥</option>
                <option value="后台">后台</option>
            </select>
        </div>
        
        <div id="teacherNotice" style="display:none;background:#fff3cd;color:#856404;padding:12px;border-radius:8px;margin-bottom:20px;font-size:0.9em;text-align:center;">
            🔐 老师账号仅限授权用户登录
        </div>
        
        <button class="login-btn" onclick="login()" id="loginBtn">登录</button>
        
        <div class="footer">
            <p>Created with ✨ by 小灵</p>
        </div>
    </div>
    
    <script>
        let selectedRole = 'student';
        
        function selectRole(role) {
            selectedRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            document.getElementById(`role-${role}`).classList.add('selected');
            
            const gridGroup = document.getElementById('gridGroup');
            const teacherNotice = document.getElementById('teacherNotice');
            if (role === 'teacher') {
                gridGroup.style.display = 'none';
                teacherNotice.style.display = 'block';
                document.getElementById('username').placeholder = '请输入老师账号';
            } else {
                gridGroup.style.display = 'block';
                teacherNotice.style.display = 'none';
                document.getElementById('username').placeholder = '请输入用户名（如：张三）';
            }
        }
        
        async function login() {
            const username = document.getElementById('username').value.trim();
            const grid = document.getElementById('grid').value;
            const errorDiv = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');
            
            if (!username) {
                errorDiv.textContent = '请输入用户名！';
                errorDiv.style.display = 'block';
                return;
            }
            
            // 学员需要选择网格
            if (selectedRole === 'student' && !grid) {
                errorDiv.textContent = '请选择所属网格！';
                errorDiv.style.display = 'block';
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, role: selectedRole, grid: grid || '' })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    window.location.href = selectedRole === 'teacher' ? '/teacher' : '/student';
                } else {
                    errorDiv.textContent = result.message;
                    errorDiv.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.textContent = '登录';
                }
            } catch (e) {
                errorDiv.textContent = '登录失败，请重试';
                errorDiv.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        }
        
        document.getElementById('username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
